<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lê Trần Kim Hưng | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --primary: #3b82f6;
      --secondary: #ec4899;
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
      color: #f8fafc;
      padding: 20px;
      line-height: 1.5;
    }

    /* Hiệu ứng hạt nền nhẹ nhàng */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
      opacity: 0.05;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    /* Dải màu trang trí phía trên */
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .avatar-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e293b, #334155);
      border: 2px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }

    /* Đèn nháy Status Live */
    .status-dot {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 18px;
      height: 18px;
      background: #22c55e;
      border: 3px solid var(--bg-dark);
      border-radius: 50%;
    }

    .status-dot::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      100% {
        transform: scale(2.5);
        opacity: 0;
      }
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 99px;
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: -0.025em;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 25px;
    }

    .info-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 30px;
    }

    .info-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 15px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .info-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: #64748b;
      font-weight: 700;
      margin-bottom: 4px;
      display: block;
    }

    .info-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .tech-wrap {
      margin-top: 25px;
    }

    .tech-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag {
      font-size: 0.75rem;
      padding: 6px 12px;
      background: #334155;
      border-radius: 8px;
      color: #cbd5e1;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tag:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    .docker-status {
      margin-top: 30px;
      background: #000;
      border-radius: 12px;
      padding: 15px;
      border-left: 4px solid var(--primary);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .terminal-text {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #22c55e;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.7rem;
      color: #475569;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <div class="avatar-container">
        <div class="avatar">KH</div>
        <div class="status-dot"></div>
      </div>
      <span class="badge">HUTECH IT Student</span>
      <h1>Lê Trần Kim Hưng</h1>
      <p class="subtitle">Chuyên ngành Công nghệ Thông tin</p>
    </div>

    <div class="info-list">
      <div class="info-item">
        <span class="info-label">MSSV</span>
        <span class="info-value">2280601297</span>
      </div>
      <div class="info-item">
        <span class="info-label">Lớp</span>
        <span class="info-value">22DTHG4</span>
      </div>
      <div class="info-item">
        <span class="info-label">Khóa</span>
        <span class="info-value">2022 - 2026</span>
      </div>
      <div class="info-item">
        <span class="info-label">Cơ sở</span>
        <span class="info-value">E3 - HCMC</span>
      </div>
    </div>

    <div class="tech-wrap">
      <span class="info-label">Tech Stack</span>
      <div class="tech-tags">
        <span class="tag">Java 17</span>
        <span class="tag">Spring Boot</span>
        <span class="tag">Docker</span>
        <span class="tag">CI/CD</span>
        <span class="tag">MySQL</span>
      </div>
    </div>

    <div class="docker-status">
      <div style="font-size: 1.5rem;">🐋</div>
      <div class="terminal-text">
        $ docker ps<br>
        <span style="color: #fff;">STATUS: </span> Up 2 minutes (healthy)<br>
        <span style="color: #fff;">PORT: </span> 0.0.0.0:8080->8080
      </div>
    </div>

    <div class="footer">
      Built with ❤️ & GitHub Actions | 2026
    </div>
  </div>
</body>

</html>
