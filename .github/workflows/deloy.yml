name: Deploy Docker Image (Command Line)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 🔹 Bước 1: Checkout code
    - name: Bước 1 - Checkout code
      uses: actions/checkout@v6.0.2

    # 🔹 Bước 2: Docker login
    - name: Bước 2 - Login Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 🔹 Bước 3: Xác định version
    - name: Bước 3 - Set version
      id: vars
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=latest
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    # 🔹 Bước 4: Build Backend Image
    - name: Bước 4 - Build Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.vars.outputs.VERSION }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.vars.outputs.VERSION }} ${{ secrets.DOCKER_USERNAME }}/my-app:latest

    # 🔹 Bước 5: Push Backend Image
    - name: Bước 5 - Push Backend
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.vars.outputs.VERSION }}
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest

    # 🔹 Bước 6: Build Frontend (nếu có)
    - name: Bước 6 - Build Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-frontend:${{ steps.vars.outputs.VERSION }} ./cv-profile
        docker tag ${{ secrets.DOCKER_USERNAME }}/my-frontend:${{ steps.vars.outputs.VERSION }} ${{ secrets.DOCKER_USERNAME }}/my-frontend:latest

    # 🔹 Bước 7: Push Frontend
    - name: Bước 7 - Push Frontend
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-frontend:${{ steps.vars.outputs.VERSION }}
        docker push ${{ secrets.DOCKER_USERNAME }}/my-frontend:latest
