name: Tự động Deploy lên Docker Hub

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Checkout code
        uses: actions/checkout@v4

      - name: Bước 1.5 - Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bước 2 - Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 3 - Lấy version
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Bước 4 - Build & Push Backend (App)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile 
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.vars.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bước 5 - Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          # Lưu ý: Nếu có file Dockerfile riêng cho frontend, hãy sửa ở đây (vd: ./frontend.Dockerfile)
          file: ./Dockerfile 
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Triển khai lên DevOps Classroom
        env:
          # Sử dụng biến để tránh gõ sai tên
          DOCKER_REPO: "letrankimhung/my-frontend"
          CONTAINER_PORT: 80
        run: |
          echo "Đang gửi yêu cầu deploy cho $DOCKER_REPO..."
          
          # Thực hiện gọi Webhook
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$DOCKER_REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT")
          
          # Tách nội dung JSON và mã lỗi HTTP
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP Status Code: $CODE"
          
          if [ "$CODE" -eq 502 ]; then
            echo "::error::Lỗi 502: Server Classroom đang bảo trì hoặc quá tải. Hãy thử lại sau vài phút."
            exit 1
          elif [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại với lỗi: $CODE"
            echo "::group::Chi tiết phản hồi từ Server"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          
          echo "Chúc mừng! Deploy thành công."
          echo "::group::Thông tin chi tiết"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
