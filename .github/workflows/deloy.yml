name: Tự động Deploy lên Docker Hub

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Checkout code
        uses: actions/checkout@v4

      - name: Bước 1.5 - Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bước 2 - Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 3 - Lấy version
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Bước 4 - Build & Push Backend (App)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile 
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.vars.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bước 5 - Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile 
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Triển khai lên DevOps Classroom
        env:
          # Sử dụng username từ secret để ghép tên repo chính xác
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          REPO_NAME="$DOCKER_USER/my-frontend"
          PORT=80
          
          echo "Đang gọi Webhook cho: $REPO_NAME"
          
          # Thực hiện CURL và lấy cả Body lẫn Http Code
          # Lưu ý: Kiểm tra kỹ DEPLOY_URL trong GitHub Secrets xem có thừa dấu / ở cuối không
          RESPONSE=$(curl -sS -L -w "\n%{http_code}" -X POST "${DEPLOY_URL}?repo=${REPO_NAME}&tag=latest&slot=1&container_port=${PORT}")
          
          HTTP_BODY=$(echo "$RESPONSE" | sed '$d')
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Kết quả trả về (HTTP Code): $HTTP_CODE"
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
            echo "✅ Deploy thành công!"
            echo "::group::Chi tiết phản hồi"
            echo "$HTTP_BODY" | python3 -m json.tool 2>/dev/null || echo "$HTTP_BODY"
            echo "::endgroup::"
          else
            echo "❌ Deploy thất bại với lỗi $HTTP_CODE"
            if [ "$HTTP_CODE" -eq 404 ]; then
               echo "LƯU Ý: Lỗi 404 nghĩa là DEPLOY_URL của bạn bị sai đường dẫn. Hãy kiểm tra lại Settings > Secrets."
            elif [ "$HTTP_CODE" -eq 502 ]; then
               echo "LƯU Ý: Lỗi 502 nghĩa là Server Classroom đang bị sập hoặc quá tải."
            fi
            echo "::group::Nội dung lỗi chi tiết"
            echo "$HTTP_BODY"
            echo "::endgroup::"
            exit 1
          fi
