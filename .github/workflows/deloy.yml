name: Tự động Deploy lên Docker Hub

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Checkout code
        uses: actions/checkout@v4

      # Thêm bước này để tránh lỗi build trên môi trường Github
      - name: Bước 1.5 - Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bước 2 - Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 3 - Lấy version
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Bước 4 - Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile  # Đảm bảo file này tồn tại ở gốc
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.vars.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          # Thêm cache để build nhanh hơn và tránh lỗi tải thư viện
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bước 5 - Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./cv-profile
          file: ./cv-profile/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-frontend:${{ steps.vars.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/my-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
