name: Deploy Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'   # Trigger khi push tag (v1.0, v2.0,...)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 🔹 Bước 1: Checkout source code
    - name: Bước 1 - Checkout code
      uses: actions/checkout@v6.0.2

    # 🔹 Bước 2: Đăng nhập Docker Hub
    - name: Bước 2 - Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 🔹 Bước 3: Lấy version từ Git tag
    - name: Bước 3 - Extract version
      id: vars
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    # 🔹 Bước 4: Build Docker Image
    - name: Bước 4 - Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.vars.outputs.VERSION }} .
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:latest .

    # 🔹 Bước 5: Push Docker Image lên Docker Hub
    - name: Bước 5 - Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ steps.vars.outputs.VERSION }}
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest
